services:
  - type: web
    name: tibby-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_DEBUG
        value: false
      - key: FRONTEND_URL
        sync: false   # set this in the Render dashboard
      - key: PORT
        value: 10000  # Render's default PORT; gunicorn binds to this automatically
